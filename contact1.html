<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #ddeaf7;
        color: #000;
      }

      .wrapper {
        margin: 5% auto;
        max-width: 500px;
        padding: 1.5rem;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      }

      h1 {
        font-weight: 600;
        text-align: center;
        color: #0078e4;
        margin-bottom: 1.5rem;
      }

      .input-box input,
      .input-box select {
        width: 100%;
        padding: 13px 50px 13px 20px;
        background: #eee;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
        color: #333;
        font-weight: 500;
        margin-bottom: 5%;
      }

      .btn {
        width: 100%;
        height: 48px;
        background: #7494ec;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
      }

      .btn:hover {
        color: #0078e4;
        border: 2px solid #0078e4;
        background-color: white;
        transition: all 0.3s ease;
      }

      .btn a {
        text-decoration: none;
        color: white;
      }

      .btn a:hover {
        color: #0078e4;
      }

      @media (max-width: 768px) {
        .wrapper {
          margin-top: 15%;
          padding: 1rem;
          max-width: 90%;
        }

        h1 {
          font-size: 1.5rem;
        }

        .btn {
          height: 50px;
        }
      }
    </style>
  </head>
  <body>
    <nav
      class="navbar navbar-expand-lg navbar-light align-items-center"
      style="background-color: #eff3f5"
    >
      <div class="container-fluid">
        <a
          class="navbar-brand d-flex align-items-center"
          href="#"
          style="color: #0078e4"
        >
          <i class="fa-solid fa-tooth me-2" style="color: #0078e4"></i>
          Dentist
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-center"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link active" href="home.html" style="color: #0078e4"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="calendar.html" style="color: #0078e4"
                >Rendez-Vous</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact1.html" style="color: #0078e4"
                >Contact</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login2.html" style="color: #0078e4"
                >Compte</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="main">
      <div class="wrapper">
        <form method="POST">
          <h1>Contactez Nous</h1>
          <div class="input-box">
            <input
              type="text"
              name="nom"
              id="nom"
              placeholder="Nom du patient"
              required
            />
          </div>
          <div class="input-box">
            <input
              type="text"
              name="tel"
              id="tel"
              placeholder="N° tel du patient"
              required
            />
          </div>
          <div class="input-box">
            <select name="reason" id="reason">
              <option value="">Raison de Contact</option>
              <option value="Annulation">Annulation</option>
              <option value="Changer">Changement de rendez-vous</option>
              <option value="inf">Demande d'information</option>
              <option value="probleme">Problème Dentaire</option>
              <option value="autre">Autre</option>
            </select>
          </div>
          <div class="input-box">
            <input
              type="text"
              name="sujet"
              id="sujet"
              placeholder="Sujet"
              required
            />
          </div>
          <button type="submit" class="btn"><a href="#">Envoyer</a></button>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
