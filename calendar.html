    <style>
      @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        height: 100vh;
        font-family: Poppins, sans-serif;
        background-color: #e6f4ff;
        color: #000;
      }

      h1 {
        margin-top: 2.5%;
        font-weight: 600;
        text-align: center;
        color: #0078e4;
        margin-bottom: 2rem;
      }
      h3 {
        font-weight: 600;
      }
      .dates li.selected {
        color: white;
        font-weight: bold;
        position: relative;
      }

      .dates li.selected::before {
        content: "";
        width: 2rem;
        height: 2rem;
        background: #0078e4;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
      }

      .calendar {
        margin: auto;
        width: 98%;
        max-width: 380px;
        padding: 1rem;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }
      .calendar header {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .calendar nav {
        display: flex;
        align-items: center;
      }
      .calendar ul {
        list-style: none;
        display: flex;
        flex-wrap: wrap;
        text-align: center;
      }
      .calendar ul li {
        width: calc(100% / 7);
        margin-top: 25px;
        position: relative;
        z-index: 2;
      }
      #prev,
      #next {
        width: 20px;
        height: 20px;
        position: relative;
        border: none;
        background: transparent;
        cursor: pointer;
      }
      #prev::before,
      #next::before {
        content: "";
        width: 50%;
        height: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        border-style: solid;
        border-width: 0.25em 0.25em 0 0;
        border-color: #ccc;
      }
      #next::before {
        transform: translate(-50%, -50%) rotate(45deg);
      }
      #prev::before {
        transform: translate(-50%, -50%) rotate(-135deg);
      }
      #prev:hover::before,
      #next:hover::before {
        border-color: #0078e4;
      }
      .days {
        font-weight: 600;
        color: #0078e4;
      }
      .dates li.today {
        color: #fff;
      }
      .dates li.today::before {
        content: "";
        width: 2rem;
        height: 2rem;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #0078e4;
        border-radius: 50%;
        z-index: -1;
      }
      .dates li.inactive {
        color: #ccc;
      }
      .clock {
        margin-top: 1.5%;
        margin-left: 40%;
      }
      .btn {
        width: 30%;
        height: 48px;
        background: #7494ec;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        border: none;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
        margin-top: 0.5%;
        margin-left: 0.5%;
      }
      .btn:hover {
        color: #0078e4; /* Couleur du texte au survol */

        background-color: white; /* Facultatif : pour changer l'arrière-plan */
        transition: all 0.3s ease; /* Animation fluide */
      }
      .btn a {
        text-decoration: none;
        color: white;
        cursor: pointer;
      }
      .btn a:hover {
        color: #0078e4;
      }
      @media (max-width: 1280px) {
        #confirmer {
          width: 100%;
          margin-left: -30%;
        }
        #clock label {
          margin-left: -17.5%;
        }
      }
    </style>
  </head>
